<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Asesmen — Treasury Operation</title>
<style>
  :root{
    --ink:#122C31;
    --paper:#F1EEE3;
    --paper-dim:#E7E3D5;
    --brass:#AD8A4E;
    --brass-deep:#8B6D38;
    --good:#3E6B52;
    --bad:#A2403F;
    --line: rgba(18,44,49,0.16);
    --shadow: 0 18px 40px -18px rgba(18,44,49,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(173,138,78,0.18), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(173,138,78,0.10), transparent 45%);
    min-height:100vh;
    font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 40px 16px;
  }
  .stage{
    width:100%;
    max-width:640px;
  }
  .masthead{
    text-align:center;
    margin-bottom:22px;
    color: var(--paper);
  }
  .masthead .eyebrow{
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color: rgba(241,238,227,0.62);
    margin-bottom:8px;
  }
  .masthead h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:700;
    font-size: clamp(24px, 5vw, 32px);
    margin:0 0 6px 0;
    letter-spacing:0.01em;
  }
  .masthead p{
    margin:0;
    font-size:13.5px;
    color: rgba(241,238,227,0.55);
  }

  .sheet{
    position:relative;
    background: var(--paper);
    border-radius: 3px;
    box-shadow: var(--shadow);
    padding: 34px 32px 28px 32px;
    border: 1px solid rgba(18,44,49,0.08);
  }
  .sheet::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:6px;
    background: repeating-linear-gradient(90deg, var(--brass) 0 14px, transparent 14px 24px);
    opacity:0.55;
  }

  .tear{
    height:14px;
    background:
      radial-gradient(circle at 10px 0, transparent 7px, var(--ink) 7px) top left/20px 14px repeat-x;
    margin-top:-1px;
  }

  .field-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color: rgba(18,44,49,0.55);
    margin: 18px 0 8px 0;
    font-weight:600;
  }
  .field-label:first-of-type{ margin-top:2px; }
  .choice-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    border:1.5px solid var(--line);
    background: rgba(255,255,255,0.35);
    padding:9px 14px;
    border-radius:20px;
    font-size:13.5px;
    cursor:pointer;
    transition: all .15s ease;
    color: var(--ink);
  }
  .chip:hover{ border-color: var(--brass); }
  .chip.active{
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .start-btn{
    margin-top:26px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:3px;
    background: var(--brass-deep);
    color: var(--paper);
    font-size:15px;
    font-weight:600;
    letter-spacing:0.03em;
    cursor:pointer;
    transition: transform .12s ease, background .15s ease;
  }
  .start-btn:hover{ background:#7A5D2F; transform: translateY(-1px); }
  .start-btn:active{ transform: translateY(0); }
  .start-btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }

  .quiz-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }
  .bab-tag{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--brass-deep);
    font-weight:700;
  }
  .counter{
    font-family: Georgia, serif;
    font-size:13px;
    color: rgba(18,44,49,0.55);
  }
  .progress-track{
    height:4px;
    background: var(--paper-dim);
    border-radius:2px;
    overflow:hidden;
    margin: 10px 0 26px 0;
  }
  .progress-fill{
    height:100%;
    background: var(--brass);
    transition: width .3s ease;
  }

  .question-text{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px;
    line-height:1.5;
    margin: 0 0 22px 0;
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:12px;
    width:100%;
    text-align:left;
    padding:14px 16px;
    margin-bottom:10px;
    border:1.5px solid var(--line);
    background: rgba(255,255,255,0.3);
    border-radius:3px;
    font-size:14.5px;
    line-height:1.45;
    cursor:pointer;
    color: var(--ink);
    transition: border-color .12s ease, background .12s ease;
  }
  .option:hover:not(.locked){ border-color: var(--brass); background: rgba(255,255,255,0.55); }
  .option .letter{
    flex:0 0 auto;
    width:24px; height:24px;
    border-radius:50%;
    border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700;
    font-family: Georgia, serif;
  }
  .option.correct{
    border-color: var(--good);
    background: rgba(62,107,82,0.12);
  }
  .option.correct .letter{ background: var(--good); border-color: var(--good); color:#fff; }
  .option.wrong{
    border-color: var(--bad);
    background: rgba(162,64,63,0.10);
  }
  .option.wrong .letter{ background: var(--bad); border-color: var(--bad); color:#fff; }
  .option.dim{ opacity:0.55; }

  .stamp{
    display:inline-block;
    margin: 4px 0 16px 0;
    padding: 5px 16px;
    border: 2.5px solid;
    border-radius: 4px;
    transform: rotate(-3deg);
    font-family: Georgia, serif;
    font-weight:700;
    letter-spacing:0.12em;
    font-size:13px;
    text-transform:uppercase;
  }
  .stamp.good{ color: var(--good); border-color: var(--good); }
  .stamp.bad{ color: var(--bad); border-color: var(--bad); }

  .explain{
    font-size:13.5px;
    line-height:1.55;
    color: rgba(18,44,49,0.78);
    background: var(--paper-dim);
    border-left: 3px solid var(--brass);
    padding: 12px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
    display:none;
  }
  .explain.show{ display:block; }

  .next-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:3px;
    background: var(--ink);
    color: var(--paper);
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ background:#0A1E22; }

  .result-score{
    text-align:center;
    font-family: Georgia, serif;
    font-size: 52px;
    font-weight:700;
    margin: 6px 0 2px 0;
  }
  .result-sub{
    text-align:center;
    font-size:13.5px;
    color: rgba(18,44,49,0.6);
    margin-bottom:26px;
  }
  .bab-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom: 1px solid var(--line);
    font-size:13.5px;
  }
  .bab-row:last-child{ border-bottom:none; }
  .bab-bar-track{
    flex:1;
    height:6px;
    background: var(--paper-dim);
    border-radius:3px;
    margin: 0 12px;
    overflow:hidden;
  }
  .bab-bar-fill{
    height:100%;
    background: var(--brass);
  }
  .bab-score{
    font-family: Georgia, serif;
    font-weight:700;
    width:44px;
    text-align:right;
  }
  .retry-btn{
    width:100%;
    margin-top:24px;
    padding:14px;
    border:1.5px solid var(--ink);
    background:transparent;
    border-radius:3px;
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    color: var(--ink);
  }
  .retry-btn:hover{ background: rgba(18,44,49,0.06); }

  .history-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    background:transparent;
    font-size:13px;
    font-weight:600;
    color: var(--brass-deep);
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset:3px;
  }
  .history-btn:hover{ color: #7A5D2F; }

  .link-btn{
    width:100%;
    margin-top:14px;
    padding:10px;
    border:none;
    background:transparent;
    font-size:12.5px;
    color: rgba(18,44,49,0.5);
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset:3px;
  }

  .empty-state{
    text-align:center;
    font-size:13.5px;
    color: rgba(18,44,49,0.6);
    padding: 30px 10px;
    line-height:1.6;
  }

  .hist-row{
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .hist-row:last-child{ border-bottom:none; }
  .hist-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
    gap:10px;
  }
  .hist-bab{
    font-size:13.5px;
    font-weight:600;
  }
  .hist-pct{
    font-family: Georgia, serif;
    font-weight:700;
    font-size:13px;
    color: var(--brass-deep);
    white-space:nowrap;
  }
  .hist-pct.dim-pct{
    color: rgba(18,44,49,0.35);
    font-family: inherit;
    font-weight:400;
    font-style:italic;
  }
  .hist-meta{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-top:8px;
    font-size:11.5px;
    color: rgba(18,44,49,0.5);
    gap:12px;
  }
  .spark{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:32px;
  }
  .spark-bar{
    width:5px;
    background: var(--brass);
    border-radius:1px;
    opacity:0.85;
  }

  /* ---- Module select screen ---- */
  .module-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:16px 18px;
    margin-bottom:10px;
    border:1.5px solid var(--line);
    border-radius:4px;
    background: rgba(255,255,255,0.32);
    cursor:pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .module-card:hover{ border-color: var(--brass); background: rgba(255,255,255,0.55); }
  .module-card .m-title{
    font-family: Georgia, serif;
    font-weight:700;
    font-size:15.5px;
    margin-bottom:3px;
  }
  .module-card .m-sub{
    font-size:12px;
    color: rgba(18,44,49,0.55);
  }
  .module-card .m-arrow{
    font-size:18px;
    color: var(--brass-deep);
    flex:0 0 auto;
  }
  .module-card.disabled{
    cursor:default;
    opacity:0.5;
  }
  .module-card.disabled:hover{ border-color: var(--line); background: rgba(255,255,255,0.32); }
  .module-card.disabled .m-arrow{ display:none; }
  .badge-soon{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:700;
    color: rgba(18,44,49,0.45);
    border:1px solid rgba(18,44,49,0.25);
    border-radius:12px;
    padding:2px 8px;
    flex:0 0 auto;
  }

  @media (max-width:480px){
    .sheet{ padding:26px 20px 22px 20px; }
    .question-text{ font-size:17px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div class="eyebrow">Simulasi Asesmen Kemampuan Pegawai</div>
    <h1 id="mastheadTitle">Latihan Soal · Treasury Operation</h1>
    <p id="mastheadSub">Berdasarkan Modul Pembelajaran — Direktorat Jenderal Perbendaharaan</p>
  </div>

  <div class="sheet" id="sheet"></div>
  <div class="tear"></div>
</div>

<script>
const BANK_PELAKSANAAN_ANGGARAN = [
{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Dalam struktur tata kelola keuangan negara, Menteri/Pimpinan Lembaga berperan sebagai Pengguna Anggaran (PA) yang merepresentasikan fungsi:",
  opts:["Chief Financial Officer (CFO)","Chief Operating Officer (COO)","Kuasa Bendahara Umum Negara","Kepala Satuan Kerja"], ans:1,
  exp:"Menteri Keuangan berperan sebagai CFO (pengelola fiskal), sedangkan Menteri/Pimpinan Lembaga berperan sebagai COO yang menjadi Pengguna Anggaran (PA)."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Berdasarkan ketentuan larangan perangkapan jabatan pejabat perbendaharaan yang berlaku saat ini, pernyataan yang benar adalah:",
  opts:["PPK dapat dirangkap oleh PPSPM","Bendahara dapat dirangkap oleh KPA","KPA dapat merangkap sebagai PPK atau PPSPM, namun tidak boleh keduanya","PPSPM dapat dirangkap oleh Bendahara"], ans:2,
  exp:"Sesuai PP 45/2013 jo. PP 50/2018: Bendahara tidak boleh dirangkap KPA/PPK/PPSPM; PPK tidak boleh dirangkap PPSPM; sedangkan PPK atau PPSPM dapat dirangkap KPA, tapi tidak boleh keduanya sekaligus."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Jabatan Kuasa Pengguna Anggaran (KPA) bersifat ex-officio, artinya:",
  opts:["Ditetapkan melalui pemilihan oleh pegawai satker","Posisi ini melekat pada jabatan Kepala Satker","Diangkat langsung oleh Menteri Keuangan","Berlaku hanya untuk satu tahun anggaran"], ans:1,
  exp:"KPA ditunjuk sebagai representasi PA di tingkat operasional dan jabatannya bersifat ex-officio, melekat pada jabatan Kepala Satuan Kerja (Satker)."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Yang bertugas menerbitkan Surat Perintah Membayar (SPM) setelah melakukan uji formal atas SPP adalah:",
  opts:["Pejabat Pembuat Komitmen (PPK)","Bendahara Pengeluaran","Pejabat Penanda tangan SPM (PPSPM)","Kuasa Pengguna Anggaran (KPA)"], ans:2,
  exp:"PPSPM berperan sebagai validator/penguji tagihan; setelah SPP dinyatakan sesuai, PPSPM menerbitkan SPM untuk diteruskan ke KPPN."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Sertifikat kompetensi teknis bagi Bendahara dalam kerangka pejabat perbendaharaan disebut:",
  opts:["PNT (PPK Negara Tersertifikasi)","SNT (PPSPM Negara Tersertifikasi)","BNT (Bendahara Negara Tersertifikasi)","ANT (Analis Negara Tersertifikasi)"], ans:2,
  exp:"Standar Kompetensi Teknis dibuktikan dengan sertifikat: PNT untuk PPK, SNT untuk PPSPM, dan BNT untuk Bendahara."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Dokumen yang menjadi dasar bagi Kuasa BUN untuk melakukan pencairan dana APBN adalah:",
  opts:["Rencana Kerja dan Anggaran (RKA)","Daftar Isian Pelaksanaan Anggaran (DIPA)","Surat Perintah Membayar (SPM)","Petunjuk Operasional Kegiatan (POK)"], ans:1,
  exp:"DIPA digunakan oleh PA/KPA sebagai dasar pelaksanaan pembayaran dan digunakan oleh Kuasa BUN sebagai dasar pencairan dana."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Revisi DIPA yang bersifat memerlukan penelaahan, khususnya terkait efisiensi biaya per unit output, menjadi kewenangan:",
  opts:["Direktorat Pelaksanaan Anggaran","Kantor Wilayah DJPb","Direktorat Jenderal Anggaran (DJA)","Kuasa Pengguna Anggaran (KPA)"], ans:2,
  exp:"Revisi yang memerlukan penelaahan menjadi kewenangan DJA, sedangkan revisi di lingkup DJPb (Direktorat Pelaksanaan Anggaran/Kanwil) hanya bersifat pengesahan tanpa penelaahan."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Batas waktu maksimal bagi penyedia untuk mengajukan tagihan pembayaran sejak hak tagih kepada negara muncul adalah:",
  opts:["3 hari kerja","5 hari kerja","7 hari kerja","10 hari kerja"], ans:1,
  exp:"Penyedia wajib mengajukan tagihan paling lambat 5 hari kerja sejak hak tagih muncul; jika tidak, PPK wajib memberi pemberitahuan tertulis."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Mekanisme pembayaran yang menjadi prinsip utama untuk penerima hak pembayaran (penyedia, pegawai, dll.) adalah:",
  opts:["Uang Persediaan (UP)","Tambahan Uang Persediaan (TUP)","Pembayaran Langsung (LS)","Rekening Penampungan Akhir Tahun"], ans:2,
  exp:"Prinsip utama pembayaran tagihan dilakukan melalui mekanisme Pembayaran Langsung (LS) kepada penerima hak pembayaran."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Uang muka kerja yang diberikan Kuasa BUN kepada Bendahara Pengeluaran untuk membiayai kegiatan operasional sehari-hari yang tidak dapat dilakukan melalui mekanisme LS disebut:",
  opts:["Tambahan Uang Persediaan (TUP)","Uang Persediaan (UP)","Rekening Penampungan Akhir Tahun (RPATA)","Dana Titipan"], ans:1,
  exp:"UP adalah uang muka kerja untuk membiayai kegiatan operasional sehari-hari dan pengeluaran yang tidak dapat dilakukan melalui LS; TUP adalah penambahan UP untuk kondisi mendesak tertentu."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Setelah SPM disetujui oleh Kepala Seksi PD/PDMS melalui sistem SPAN, tahap berikutnya dalam pencairan dana adalah:",
  opts:["PPK menerbitkan SPP baru","Diproses melalui Payment Process Request (PPR) untuk penerbitan SP2D","Dikembalikan ke satker untuk revisi","PPSPM melakukan uji formal ulang"], ans:1,
  exp:"SPM yang telah disetujui diproses oleh Direktorat Pengelolaan Kas Negara melalui PPR untuk penerbitan Surat Perintah Pencairan Dana (SP2D)."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Konsep 'Prefinancing' dalam penetapan MP PNBP yang berlaku sejak Oktober 2021 memungkinkan:",
  opts:["Satker hanya boleh belanja setelah ada realisasi setoran PNBP","Satker dapat belanja sumber dana PNBP sebelum ada realisasi penerimaan PNBP","Satker wajib menyetorkan seluruh PNBP di akhir tahun","MP PNBP hanya dapat diajukan sekali dalam setahun"], ans:1,
  exp:"Melalui PMK 110/PMK.05/2021, konsep Prefinancing memungkinkan K/L melakukan belanja sumber dana PNBP sebelum memiliki realisasi penerimaan PNBP, untuk mempercepat kualitas belanja."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"MP PNBP Reguler Tahap I dapat diajukan paling cepat pada bulan dan dengan besaran maksimal:",
  opts:["Januari, 60%","Juli, 80%","Oktober, 100%","Maret, 50%"], ans:0,
  exp:"MP PNBP Tahap I paling besar 60% dari pagu DIPA sumber dana PNBP dan diajukan paling cepat bulan Januari."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Pola penetapan MP PNBP yang memungkinkan Kementerian/Lembaga mengajukan penetapan untuk seluruh satker sekaligus dan dapat mengubah alokasi antar satker disebut:",
  opts:["Pola tidak terpusat","Pola terpusat","Pola progresif","Pola percepatan"], ans:1,
  exp:"Pola terpusat diusulkan oleh Sekjen/Seskemen/Pimpinan Unit Eselon I dan disetujui Dirjen Perbendaharaan, memungkinkan pengajuan untuk seluruh satker sekaligus serta Perubahan Lampiran Alokasi MP PNBP antar satker."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Secara default, satker PNBP mengajukan permohonan penetapan MP PNBP melalui pola tidak terpusat kepada:",
  opts:["Direktur Jenderal Anggaran","Kepala Kantor Wilayah DJPb mitra kerjanya","Direktur Jenderal Perbendaharaan langsung","Menteri Keuangan"], ans:1,
  exp:"Pada pola tidak terpusat (default), satker PNBP mengajukan permohonan penetapan MP PNBP kepada Kepala Kantor Wilayah DJPb mitra kerjanya."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"MP PNBP Percepatan Tahap II dapat diajukan sebelum bulan Juli dengan syarat realisasi setoran PNBP telah mencapai paling kurang:",
  opts:["40%","50%","60%","70%"], ans:2,
  exp:"MP PNBP Percepatan Tahap II (maksimal 80%) dapat diajukan sebelum Juli dengan syarat realisasi setoran PNBP telah mencapai minimal 60%."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Hibah yang mekanismenya menggabungkan proses perencanaan (dialokasikan dalam RKA-K/L dan DIPA) namun pelaksanaannya menerapkan mekanisme hibah langsung disebut:",
  opts:["Hibah terencana","Hibah langsung murni","Hibah hybrid","Hibah spontan"], ans:2,
  exp:"Hibah hybrid melalui mekanisme perencanaan (dialokasikan dalam RKA-K/L dan DIPA) namun pelaksanaannya menerapkan mekanisme hibah langsung. Contohnya Hibah Millennium Challenge Corporation (MCC)."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Berdasarkan penarikannya, hibah diklasifikasikan menjadi:",
  opts:["Hibah uang dan hibah barang/jasa","Hibah dalam negeri dan hibah luar negeri","Hibah melalui BUN dan hibah tidak melalui BUN","Hibah terencana dan hibah hybrid"], ans:2,
  exp:"Menurut penarikannya, hibah diklasifikasikan menjadi hibah melalui Bendahara Umum Negara (BUN) dan hibah tidak melalui BUN."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Satker penerima hibah langsung uang wajib menggunakan rekening khusus yang disebut:",

  exp:"DPR memiliki hak budget/begrooting untuk menetapkan pendapatan dan belanja negara; kedudukan DPR lebih kuat karena penetapan APBN adalah bentuk kedaulatan rakyat."},

{bab:"Bab 1 — Pendahuluan", q:"Fungsi UU Keuangan Negara sebagai jembatan yang menyelaraskan berbagai UU di bidang keuangan negara yang sebelumnya terpisah-pisah disebut sebagai:",
  opts:["lex specialis","umbrella act","restatement hukum","kodifikasi tunggal"], ans:1,
  exp:"UU Keuangan Negara berfungsi sebagai harmonisasi dan diharapkan dapat dijadikan sebagai payung (umbrella act) bagi undang-undang lainnya di bidang keuangan negara."},

{bab:"Bab 1 — Pendahuluan", q:"Ketentuan bidang keuangan negara yang berlaku sejak masa kolonial Hindia Belanda dan tetap digunakan setelah Indonesia merdeka hingga tahun 2003 dikenal dengan nama:",
  opts:["RAB (Regelen voor het Administratief Beheer)","ICW (Indische Comptabiliteitswet)","IAR (Instructie en verdere bepalingen voor de Algemeene Rekenkamer)","IBW (Indische Bedrijvenwet)"], ans:1,
  exp:"Indische Comptabiliteitswet (ICW) Stbl. 1925 No. 448 adalah ketentuan bidang keuangan negara sejak masa kolonial yang terus digunakan hingga digantikan UU Nomor 17 Tahun 2003."},

{bab:"Bab 1 — Pendahuluan", q:"Tiga undang-undang yang membentuk satu paket UU di bidang pengelolaan keuangan negara adalah UU 17/2003, UU 1/2004, dan:",
  opts:["UU 33/2004 tentang Perimbangan Keuangan","UU 15/2004 tentang Pemeriksaan Pengelolaan dan Tanggung Jawab Keuangan Negara","UU 28/2009 tentang Pajak Daerah","UU 23/2014 tentang Pemerintahan Daerah"], ans:1,
  exp:"Tiga UU tersebut merupakan satu paket UU pengelolaan keuangan negara: UU 17/2003 (Keuangan Negara), UU 1/2004 (Perbendaharaan Negara), dan UU 15/2004 (Pemeriksaan Pengelolaan dan Tanggung Jawab Keuangan Negara)."},

{bab:"Bab 1 — Pendahuluan", q:"UU Nomor 1 Tahun 2004 tentang Perbendaharaan Negara merupakan penjelasan lebih lanjut dari bagian UUD 1945, yaitu:",
  opts:["Bab VIII (Pelaksanaan APBN dan APBD)","Bab VIIIA (Pertanggungjawaban Pelaksanaan APBN dan APBD)","Bab IX (Kekuasaan Kehakiman)","Bab X (Warga Negara)"], ans:0,
  exp:"UU Nomor 1 Tahun 2004 merupakan penjelasan lebih lanjut atas Bab VIII UUD 1945 tentang Pelaksanaan APBN dan APBD, sedangkan UU Nomor 15 Tahun 2004 merupakan penjelasan Bab VIIIA."},

{bab:"Bab 1 — Pendahuluan", q:"Menurut modul, kedudukan UU Nomor 1 Tahun 2004 tentang Perbendaharaan Negara terhadap UU Nomor 17 Tahun 2003 tentang Keuangan Negara adalah:",
  opts:["lex specialis","bukan lex specialis, karena memiliki dimensi berbeda","peraturan pelaksana teknis semata","pengganti penuh"], ans:1,
  exp:"UU Nomor 1 Tahun 2004 bukanlah lex specialis dari UU Nomor 17 Tahun 2003, karena memiliki dimensi yang berbeda: aspek administratif (Perbendaharaan) versus aspek politis (Keuangan Negara)."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Sesuai Pasal 1 ayat 1 UU Nomor 17 Tahun 2003, kriteria utama agar suatu hal dapat diklasifikasikan sebagai keuangan negara adalah:",
  opts:["berkaitan dengan kegiatan ekonomi swasta","bernilai uang atau berimplikasi pada penambahan/pengurangan kekayaan negara","melibatkan transaksi lintas negara","dikelola oleh BUMN"], ans:1,
  exp:"Sesuatu hal diklasifikasikan sebagai keuangan negara apabila berkenaan dengan hak dan kewajiban negara yang bernilai uang atau berimplikasi kepada penambahan/pengurangan kekayaan negara."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Pengertian keuangan negara dalam arti sempit memandang pemerintah sebagai:",
  opts:["individu/homo-economis yang mengejar profit","otoritas yang mengelola keuangan negara untuk layanan publik melalui APBN","korporasi murni","lembaga independen tanpa APBN"], ans:1,
  exp:"Dalam arti sempit, pemerintah dipandang sebagai otoritas yang mengelola keuangan negara untuk memenuhi layanan publik melalui APBN, mendapat mandat rakyat untuk kepentingan masyarakat."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Kekayaan negara yang digunakan untuk mendukung kegiatan pemerintah sebagai otoritas (bukan untuk kepentingan pribadi/profit) disebut:",
  opts:["kekayaan negara yang dipisahkan","kekayaan negara yang tidak dipisahkan","kekayaan negara privat","kekayaan negara terbatas"], ans:1,
  exp:"Kekayaan negara yang tidak dipisahkan adalah kekayaan negara yang digunakan untuk mendukung kegiatan pemerintah sebagai otoritas, dikelola dalam sistem APBN."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Pengertian keuangan negara yang terkandung dalam UU Keuangan Negara adalah pengertian dalam arti luas, yang juga dikenal sebagai:",
  opts:["Keuangan Sektor Publik","Keuangan Sektor Riil","Keuangan Sektor Swasta","Keuangan Multilateral"], ans:0,
  exp:"Pengertian Keuangan Negara dalam UU Keuangan Negara adalah pengertian dalam arti luas yang dikenal sebagai Keuangan Sektor Publik, mencakup semua unsur pemerintah yang memiliki kewenangan pengambilan keputusan keuangan."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Pendekatan yang digunakan dalam merumuskan Keuangan Negara menurut penjelasan UU Nomor 17 Tahun 2003 adalah dari sisi obyek, subyek, proses, dan:",
  opts:["waktu","tujuan","lokasi","instrumen"], ans:1,
  exp:"Pendekatan perumusan Keuangan Negara adalah dari sisi obyek, subyek, proses, dan tujuan, sebagaimana disebutkan dalam penjelasan angka 3 UU Keuangan Negara."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Contoh kekayaan pihak lain yang diperoleh dengan menggunakan fasilitas pemerintah, sehingga termasuk ruang lingkup keuangan negara sesuai Pasal 2 huruf i UU 17/2003, adalah anggaran pada:",
  opts:["Bank Indonesia","Otoritas Jasa Keuangan (OJK)","Badan Pemeriksa Keuangan","Kementerian Keuangan"], ans:1,
  exp:"OJK menjadi contoh konkret ruang lingkup Pasal 2 huruf i, karena anggaran OJK merupakan bagian dari APBN yang dialokasikan pada bagian anggaran BUN, meski dananya berasal dari pungutan industri jasa keuangan."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Asas yang membatasi tahun anggaran meliputi masa satu tahun dan menjadi prinsip utama penyusunan anggaran disebut:",
  opts:["Asas Universalitas","Asas Tahunan/Asas Berkala (Periodisitas)","Asas Spesialitas","Asas Anterioritas"], ans:1,
  exp:"Pasal 4 UU Nomor 17 Tahun 2003 membatasi tahun anggaran meliputi masa satu tahun (1 Januari–31 Desember), dikenal dengan Asas Tahunan atau Asas Berkala (Periodisitas)."},

{bab:"Bab 2 — Pengertian dan Ruang Lingkup Keuangan Negara", q:"Tahun anggaran Indonesia pernah berlaku dari 1 April hingga 31 Maret berdasarkan UU Nomor 9 Tahun 1968, hingga akhirnya kembali mengikuti tahun takwim mulai tahun:",
  opts:["1998","2000","2001","2004"], ans:2,
  exp:"Mulai tahun 2001, tahun anggaran kembali diberlakukan mengikuti tahun takwim 1 Januari–31 Desember, setelah sejak 1968 menggunakan periode 1 April–31 Maret."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Berdasarkan Pasal 6 ayat (1) UU Nomor 17 Tahun 2003, kekuasaan pengelolaan keuangan negara berada di tangan:",
  opts:["Menteri Keuangan","Presiden","DPR","Badan Pemeriksa Keuangan"], ans:1,
  exp:"Pasal 6 ayat (1) UU Nomor 17 Tahun 2003 menyatakan kekuasaan pengelolaan keuangan negara berada di tangan Presiden selaku Kepala Pemerintahan."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Tiga jenis kekuasaan pengelolaan keuangan negara yang dimiliki Presiden adalah kekuasaan otorisasi, kekuasaan ordonansi, dan:",
  opts:["kekuasaan legislasi","kekuasaan kebendaharaan","kekuasaan yudikatif","kekuasaan moneter"], ans:1,
  exp:"Kekuasaan penyelenggaraan pemerintahan negara meliputi tiga kekuasaan pengelolaan keuangan negara: otorisasi, ordonansi, dan kebendaharaan."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Kekuasaan untuk menerima, meneliti, menguji keabsahan, dan menerbitkan surat perintah membayar tagihan yang membebani anggaran disebut kekuasaan:",
  opts:["otorisasi","ordonansi","kebendaharaan","legislasi"], ans:1,
  exp:"Kekuasaan ordonansi adalah kekuasaan untuk menerima, meneliti, menguji keabsahan, dan menerbitkan surat perintah menagih dan membayar tagihan sebagai akibat dari tindakan otorisator."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Dalam pendelegasian kewenangan Presiden, Menteri Keuangan berperan sebagai Chief Financial Officer (CFO), sedangkan para Menteri sebagai Pengguna Anggaran berperan sebagai:",
  opts:["Chief Operating Officer (COO)","Chief Executive Officer (CEO)","Chief Risk Officer (CRO)","Chief Legal Officer (CLO)"], ans:0,
  exp:"Peran para menteri sebagai pembantu Presiden dibedakan menjadi CFO (khusus Menteri Keuangan) dan COO (semua menteri, termasuk Menteri Keuangan sebagai kepala kementeriannya sendiri)."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Kekuasaan ordonansi secara eksklusif didelegasikan Presiden hanya kepada:",
  opts:["Menteri/Pimpinan Lembaga","Menteri Keuangan","Gubernur/Bupati/Walikota","Direksi BUMN"], ans:1,
  exp:"Berbeda dengan kekuasaan otorisasi yang didelegasikan kepada semua menteri, kekuasaan ordonansi secara eksklusif didelegasikan hanya kepada Menteri Keuangan sebagai CFO."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Setiap Kepala Satker yang menjadi penerima kuasa dari menteri selaku Pengguna Anggaran disebut sebagai:",
  opts:["Kuasa Bendahara Umum Negara","Kuasa Pengguna Anggaran (KPA)","Pejabat Pembuat Komitmen","Kuasa BUN Daerah"], ans:1,
  exp:"Setiap Kepala Satker yang disebut Kuasa Pengguna Anggaran (KPA) merupakan penerima kuasa dari menteri selaku Pengguna Anggaran, bersifat ex officio melekat pada jabatan Kepala Satker."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Tujuan utama pembagian kewenangan antara Menteri Keuangan selaku BUN (CFO) dan para Menteri selaku Pengguna Anggaran (COO) adalah untuk mencegah konsentrasi kewenangan dan menciptakan mekanisme:",
  opts:["sentralisasi penuh","check and balance (prinsip saling uji)","monopoli kebijakan fiskal","outsourcing pengelolaan anggaran"], ans:1,
  exp:"Pembagian kewenangan bertujuan mencegah konsentrasi kewenangan di satu pihak agar tercipta mekanisme check and balance antara para pejabat pengelola keuangan negara demi good governance."},

{bab:"Bab 3 — Kekuasaan atas Pengelolaan Keuangan Negara", q:"Prinsip yang harus dianut dalam pembagian kewenangan antara pemegang peran BUN dan PA agar mekanisme saling uji berjalan efektif adalah prinsip:",
  opts:["prinsip hierarki","prinsip kesetaraan","prinsip subordinasi","prinsip sentralisasi"], ans:1,
  exp:"Pembagian kewenangan dalam pengelolaan keuangan negara harus didasarkan pada prinsip kesetaraan di antara para pengelolanya; BUN dan PA harus memiliki kedudukan setara (sama-sama menteri)."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Berdasarkan Pasal 11 ayat (2) UU Nomor 17 Tahun 2003, APBN terdiri atas anggaran pendapatan, anggaran belanja, dan:",
  opts:["anggaran cadangan","pembiayaan","anggaran darurat","anggaran subsidi"], ans:1,
  exp:"Pasal 11 ayat (2) UU Nomor 17 Tahun 2003 menyatakan bahwa APBN terdiri atas anggaran pendapatan, anggaran belanja, dan pembiayaan."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Sesuai penjelasan Pasal 12 ayat (3) UU Nomor 17 Tahun 2003, defisit anggaran dibatasi maksimal:",
  opts:["2% dari PDB","3% dari PDB","5% dari PDB","tidak dibatasi"], ans:1,
  exp:"Defisit anggaran dibatasi maksimal 3% dari Produk Domestik Bruto (PDB), sebagaimana ditegaskan dalam penjelasan Pasal 12 ayat (3) UU Nomor 17 Tahun 2003."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Dalam hal anggaran diperkirakan surplus, kebijakan surplus anggaran diutamakan pemanfaatannya untuk pengurangan utang, pembentukan cadangan, dan:",
  opts:["peningkatan jaminan sosial","penambahan belanja pegawai","subsidi BBM","pembangunan infrastruktur baru"], ans:0,
  exp:"Kebijakan surplus anggaran diutamakan untuk pengurangan utang, pembentukan cadangan, dan peningkatan jaminan sosial, sesuai Pasal 12 ayat (4) UU Nomor 17 Tahun 2003."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Pemerintah menyampaikan pokok-pokok kebijakan fiskal dan kerangka ekonomi makro kepada DPR (pembicaraan pendahuluan) selambat-lambatnya pada:",
  opts:["akhir bulan April","pertengahan bulan Mei","akhir bulan Juni","awal bulan Agustus"], ans:1,
  exp:"Sesuai Pasal 13 UU Nomor 17 Tahun 2003, pemerintah menyampaikan pokok-pokok kebijakan fiskal dan kerangka ekonomi makro tahun anggaran berikutnya kepada DPR selambat-lambatnya pertengahan bulan Mei tahun berjalan."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Pendekatan penyusunan RKAKL yang mengintegrasikan seluruh proses perencanaan dan penganggaran K/L untuk menghindari duplikasi penyediaan dana disebut:",
  opts:["Pendekatan Penganggaran Terpadu","Pendekatan Penganggaran Berbasis Kinerja","Pendekatan KPJM","Pendekatan Zero-Based Budgeting"], ans:0,
  exp:"Pendekatan Penganggaran Terpadu mengintegrasikan seluruh proses perencanaan dan penganggaran di lingkungan K/L untuk menghasilkan RKAKL, mencegah duplikasi penyediaan dana."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Pendekatan penyusunan anggaran yang menunjukkan keterkaitan jelas antara alokasi pendanaan dengan tingkat kinerja yang diharapkan disebut:",
  opts:["Kerangka Pengeluaran Jangka Menengah (KPJM)","Penganggaran Berbasis Kinerja (PBK)","Penganggaran Terpadu","Line-item Budgeting"], ans:1,
  exp:"Penganggaran Berbasis Kinerja (PBK) menunjukkan secara jelas keterkaitan antara alokasi pendanaan dan kinerja yang diharapkan, dengan prinsip antara lain money follow function dan let the manager manages."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Pengambilan keputusan oleh DPR mengenai RUU APBN dilakukan selambat-lambatnya:",
  opts:["1 bulan sebelum tahun anggaran dilaksanakan","2 bulan sebelum tahun anggaran dilaksanakan","3 bulan sebelum tahun anggaran dilaksanakan","pada hari terakhir tahun anggaran berjalan"], ans:1,
  exp:"Pengambilan keputusan DPR mengenai RUU APBN dilakukan selambat-lambatnya 2 (dua) bulan sebelum tahun anggaran yang bersangkutan dilaksanakan."},

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Apabila DPR tidak menyetujui RUU APBN yang diajukan pemerintah pusat, maka pemerintah pusat dapat melakukan pengeluaran setinggi-tingginya sebesar:",

{bab:"Bab 4 — Penyusunan dan Penetapan APBN", q:"Berdasarkan putusan Mahkamah Konstitusi terkait uji materi Pasal 15 ayat (5) UU Nomor 17 Tahun 2003, APBN yang disetujui DPR kini terinci sampai dengan unit organisasi, fungsi, dan:",
  opts:["jenis belanja","program","kegiatan","sub-kegiatan"], ans:1,
  exp:"MK mengabulkan uji materi sehingga frasa 'kegiatan, dan jenis belanja' dihapus; Pasal 15 ayat (5) menjadi 'APBN yang disetujui oleh DPR terinci sampai dengan unit organisasi, fungsi, dan program.'"},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"APBD merupakan wujud pengelolaan keuangan daerah yang ditetapkan setiap tahun dengan:",
  opts:["Keputusan Presiden","Peraturan Daerah","Peraturan Menteri Keuangan","Keputusan Gubernur"], ans:1,
  exp:"APBD merupakan wujud pengelolaan keuangan daerah yang ditetapkan setiap tahun dengan Peraturan Daerah, sesuai Pasal 16 UU Nomor 17 Tahun 2003."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Sumber pendapatan asli daerah (PAD) meliputi hasil pajak daerah, hasil retribusi daerah, hasil perusahaan milik daerah, dan:",
  opts:["dana perimbangan","lain-lain pendapatan asli daerah yang sah","dana darurat","pendapatan transfer pusat"], ans:1,
  exp:"PAD terdiri dari hasil pajak daerah, hasil retribusi daerah, hasil perusahaan milik daerah/kekayaan daerah yang dipisahkan, dan lain-lain PAD yang sah."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Seperti halnya APBN, defisit APBD juga dibatasi maksimal 3% dari:",
  opts:["PDB nasional","Produk Regional Domestik Bruto (PDRB) daerah bersangkutan","total belanja daerah tahun sebelumnya","dana perimbangan yang diterima"], ans:1,
  exp:"Defisit APBD dibatasi maksimal 3% dari Produk Regional Domestik Bruto (PDRB) daerah yang bersangkutan, sebagaimana tertuang dalam penjelasan Pasal 17 ayat (3) UU Nomor 17 Tahun 2003."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Rancangan Kebijakan Umum APBD (KUA) disampaikan pemerintah daerah kepada DPRD selambat-lambatnya:",
  opts:["pertengahan bulan Mei","pertengahan bulan Juni","akhir bulan Juli","awal bulan September"], ans:1,
  exp:"Pemerintah daerah menyampaikan rancangan KUA kepada DPRD selambat-lambatnya pertengahan bulan Juni tahun anggaran berjalan, untuk dibahas dalam pembicaraan pendahuluan RAPBD."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Setelah KUA disepakati, pemerintah daerah menyusun dokumen yang menentukan skala prioritas urusan wajib/pilihan, urutan program, dan plafon anggaran sementara, yaitu:",
  opts:["RKPD","Prioritas dan Plafon Anggaran Sementara (PPAS)","RKA SKPD","Renstra SKPD"], ans:1,
  exp:"Berdasarkan KUA yang disepakati, pemerintah daerah menyusun PPAS yang menentukan skala prioritas urusan wajib/pilihan, urutan program, dan plafon anggaran sementara masing-masing program."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"RKA SKPD yang telah disusun disampaikan kepada Pejabat Pengelola Keuangan Daerah (PPKD) untuk dibahas kesesuaiannya dengan KUA, PPAS, dan beberapa hal lain, kecuali:",
  opts:["indikator kinerja","standar satuan harga","keputusan hakim pidana","standar pelayanan minimal"], ans:2,
  exp:"RKA SKPD dibahas kesesuaiannya dengan KUA, PPAS, prakiraan maju, indikator kinerja, analisis standar belanja, standar satuan harga, dan standar pelayanan minimal — bukan keputusan hakim pidana yang tidak relevan."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Berbeda dengan RKAKL tingkat pusat, dalam praktiknya RKA SKPD tidak dibahas dalam pembicaraan pendahuluan dengan DPRD, namun disosialisasikan ke masyarakat dan disampaikan ke DPRD paling lambat pada:",

  exp:"Penyampaian RKA SKPD ke DPRD dilakukan paling lambat pada minggu pertama bulan Oktober tahun sebelumnya dari tahun yang direncanakan, untuk mendapatkan persetujuan bersama."},

{bab:"Bab 5 — Penyusunan dan Penetapan APBD", q:"Setiap pergeseran anggaran antar unit organisasi, antar kegiatan, dan antar jenis belanja pada APBN/APBD harus mendapat persetujuan:",

{bab:"Bab 6 — Hubungan Keuangan Pemerintah Pusat, Bank Sentral, Daerah, dan Lembaga Asing", q:"Sejak UU Bank Indonesia Nomor 23 Tahun 1999 dan amandemen UUD 1945, kedudukan Bank Sentral menjadi:",

{bab:"Bab 6 — Hubungan Keuangan Pemerintah Pusat, Bank Sentral, Daerah, dan Lembaga Asing", q:"Pemerintah wajib berkonsultasi dengan Bank Indonesia terkait rencana penerbitan surat utang negara agar:",
  opts:["BI dapat membeli seluruh surat utang","penerbitan tepat waktu dan tidak berakibat negatif terhadap kebijakan moneter","BI dapat menetapkan bunga surat utang","DPR tidak perlu menyetujui"], ans:1,

{bab:"Bab 6 — Hubungan Keuangan Pemerintah Pusat, Bank Sentral, Daerah, dan Lembaga Asing", q:"Dalam Rapat Dewan Gubernur Bank Indonesia, Pemerintah dapat menghadiri rapat dengan:",

let currentModuleId = null;
let session = [];
let idx = 0;
let score = 0;
let answered = false;
let babStats = {};

function historyKey(){
  return 'latihan_history_v1_' + currentModuleId;
}

function loadHistory(){
  try{
    const raw = localStorage.getItem(historyKey());
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

function saveAttempt(babStatsResult){
  try{
    const history = loadHistory();
    history.push({ date: new Date().toISOString(), babStats: babStatsResult });
    localStorage.setItem(historyKey(), JSON.stringify(history));
  }catch(e){ /* storage unavailable, skip silently */ }
}

function clearHistory(){
  try{ localStorage.removeItem(historyKey()); }catch(e){}
}

function aggregateHistory(){
  const history = loadHistory();
  const agg = {};
  history.forEach(attempt=>{
    Object.keys(attempt.babStats).forEach(bab=>{
      if(!agg[bab]) agg[bab] = {correct:0, total:0, attempts:0, trend:[]};
      const s = attempt.babStats[bab];
      agg[bab].correct += s.correct;
      agg[bab].total += s.total;
      agg[bab].attempts += 1;
      agg[bab].trend.push(Math.round((s.correct/s.total)*100));
    });
  });
  return {agg, sessionCount: history.length, lastDate: history.length ? history[history.length-1].date : null};
}

function babOrderForModule(){
  const seen = [];
  MODULES[currentModuleId].bank.forEach(q=>{
    if(!seen.includes(q.bab)) seen.push(q.bab);
  });
  return seen;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

    ${cards}
  `;
  sheet.querySelectorAll('.module-card[data-id]').forEach(card=>{
    card.onclick = ()=>{
      currentModuleId = card.dataset.id;
      const m = MODULES[currentModuleId];
      document.getElementById('mastheadTitle').textContent = 'Latihan Soal · ' + m.title;
      document.getElementById('mastheadSub').textContent = m.subtitle;
      renderSetup();
    };
  });
}

function renderSetup(){
  const sheet = document.getElementById('sheet');
  const bank = MODULES[currentModuleId].bank;
  const babList = babOrderForModule();
  let scopeChips = `<div class="chip active" data-v="all">Acak semua bab</div>`;
  babList.forEach((bab, i)=>{
    const short = bab.replace(/^Bab \d+ — /,'');
    scopeChips += `<div class="chip" data-v="${i+1}">Bab ${i+1}: ${short}</div>`;
  });
  sheet.innerHTML = `
    <div class="field-label" style="margin-top:0;">Jumlah soal</div>
    <div class="choice-row" id="countRow">
      <div class="chip" data-v="10">10 soal</div>
      <div class="chip active" data-v="20">20 soal</div>
      <div class="chip" data-v="${bank.length}">Semua (${bank.length} soal)</div>
    </div>
    <div class="field-label">Cakupan bab</div>
    <div class="choice-row" id="scopeRow">${scopeChips}</div>
    <button class="start-btn" id="startBtn">Mulai Latihan</button>
    <button class="link-btn" id="viewHistoryBtn">Lihat Monitoring Riwayat Latihan</button>
    <button class="link-btn" id="backModuleBtn">← Ganti Modul</button>
  `;
  let count = 20, scope = 'all';
  document.querySelectorAll('#countRow .chip').forEach(c=>{
    c.onclick = ()=>{
      document.querySelectorAll('#countRow .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      count = parseInt(c.dataset.v);
    };
  });
  document.querySelectorAll('#scopeRow .chip').forEach(c=>{
    c.onclick = ()=>{
      document.querySelectorAll('#scopeRow .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      scope = c.dataset.v;
    };
  });
  document.getElementById('viewHistoryBtn').onclick = renderHistory;
  document.getElementById('backModuleBtn').onclick = renderModuleSelect;
  document.getElementById('startBtn').onclick = ()=>{
    let pool = bank;
    if(scope !== 'all'){
      const targetBab = babList[parseInt(scope)-1];
      pool = bank.filter(q => q.bab === targetBab);
    }
    const shuffled = shuffle(pool);
    session = shuffled.slice(0, Math.min(count, shuffled.length)).map(q=>{
      const optOrder = shuffle(q.opts.map((o,i)=>({text:o, orig:i})));
      return {...q, optOrder, correctPos: optOrder.findIndex(o=>o.orig===q.ans)};
    });
    idx = 0; score = 0; answered = false; babStats = {};
    renderQuestion();
  };
}

function renderQuestion(){
  const sheet = document.getElementById('sheet');
  const q = session[idx];
  answered = false;
  const pct = Math.round((idx/session.length)*100);
  sheet.innerHTML = `
    <div class="quiz-top">
      <div class="bab-tag">${q.bab}</div>
      <div class="counter">Soal ${idx+1} / ${session.length}</div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-text">${q.q}</div>
    <div id="optionsWrap"></div>
    <div class="explain" id="explainBox"></div>
    <button class="next-btn" id="nextBtn">${idx===session.length-1 ? 'Lihat Hasil Akhir' : 'Soal Berikutnya'}</button>
  `;
  const wrap = document.getElementById('optionsWrap');
  const letters = ['A','B','C','D'];
  q.optOrder.forEach((opt, i)=>{
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt.text}</span>`;
    div.onclick = ()=> selectOption(i);
    wrap.appendChild(div);
  });
  document.getElementById('nextBtn').onclick = ()=>{
    idx++;
    if(idx >= session.length){ renderResults(); } else { renderQuestion(); }
  };
}

function selectOption(i){
  if(answered) return;
  answered = true;
  const q = session[idx];
  if(!babStats[q.bab]) babStats[q.bab] = {correct:0, total:0};
  babStats[q.bab].total++;

  const opts = document.querySelectorAll('.option');
  const isCorrect = i === q.correctPos;
  if(isCorrect){ score++; babStats[q.bab].correct++; }

  opts.forEach((el, j)=>{
    if(j === q.correctPos) el.classList.add('correct');
    else if(j === i) el.classList.add('wrong');
    else el.classList.add('dim');
  });

  const box = document.getElementById('explainBox');
  box.innerHTML = `<span class="stamp ${isCorrect?'good':'bad'}">${isCorrect?'Benar':'Kurang Tepat'}</span><div>${q.exp}</div>`;
  box.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function renderResults(){
  saveAttempt(babStats);
  const sheet = document.getElementById('sheet');
  const pctScore = Math.round((score/session.length)*100);
  let babRows = '';
  Object.keys(babStats).forEach(bab=>{
    const s = babStats[bab];
    const p = Math.round((s.correct/s.total)*100);
    babRows += `
      <div class="bab-row">
        <span>${bab.replace(/^Bab \d+ — /,'')}</span>
        <div class="bab-bar-track"><div class="bab-bar-fill" style="width:${p}%"></div></div>
        <span class="bab-score">${s.correct}/${s.total}</span>
      </div>`;
  });
  sheet.innerHTML = `
    <div class="field-label" style="text-align:center;margin-top:0;">Hasil Latihan</div>
    <div class="result-score">${score}<span style="font-size:24px;color:rgba(18,44,49,0.4);"> / ${session.length}</span></div>
    <div class="result-sub">${pctScore}% jawaban benar</div>
    ${babRows}
    <button class="retry-btn" id="retryBtn">Latihan Lagi</button>
    <button class="history-btn" id="historyBtn">Lihat Monitoring Riwayat</button>
  `;
  document.getElementById('retryBtn').onclick = renderSetup;
  document.getElementById('historyBtn').onclick = renderHistory;
}

function renderHistory(){
  const sheet = document.getElementById('sheet');
  const {agg, sessionCount, lastDate} = aggregateHistory();
  const babOrder = babOrderForModule();

  if(sessionCount === 0){
    sheet.innerHTML = `
      <div class="field-label" style="text-align:center;margin-top:0;">Monitoring Riwayat Latihan</div>
      <div class="empty-state">Belum ada riwayat latihan tersimpan untuk modul ini. Riwayat akan tercatat otomatis setiap kali kamu menyelesaikan satu sesi latihan.</div>
      <button class="retry-btn" id="backBtn">Mulai Latihan</button>
    `;
    document.getElementById('backBtn').onclick = renderSetup;
    return;
  }

  let rows = '';
  babOrder.forEach((bab, i)=>{
    const s = agg[bab];
    const label = bab.replace(/^Bab \d+ — /,'');
    if(!s){
      rows += `
        <div class="hist-row">
          <div class="hist-top"><span class="hist-bab">Bab ${i+1} · ${label}</span><span class="hist-pct dim-pct">belum dicoba</span></div>
          <div class="bab-bar-track"><div class="bab-bar-fill" style="width:0%"></div></div>
        </div>`;
      return;
    }
    const pctAvg = Math.round((s.correct/s.total)*100);
    const lastN = s.trend.slice(-8);
    const sparkline = lastN.map(v=>`<div class="spark-bar" style="height:${Math.max(6,v*0.32)}px" title="${v}%"></div>`).join('');
    rows += `
      <div class="hist-row">
        <div class="hist-top">
          <span class="hist-bab">Bab ${i+1} · ${label}</span>
          <span class="hist-pct">${pctAvg}% rata-rata</span>
        </div>
        <div class="bab-bar-track"><div class="bab-bar-fill" style="width:${pctAvg}%"></div></div>
        <div class="hist-meta">
          <span>${s.attempts}x dikerjakan · ${s.correct}/${s.total} jawaban benar kumulatif</span>
          <div class="spark">${sparkline}</div>
        </div>
      </div>`;
  });

  const lastDateLabel = lastDate ? new Date(lastDate).toLocaleString('id-ID', {dateStyle:'medium', timeStyle:'short'}) : '-';

  sheet.innerHTML = `
    <div class="field-label" style="text-align:center;margin-top:0;">Monitoring Riwayat Latihan</div>
    <div class="result-sub" style="margin-bottom:22px;">${sessionCount} sesi tercatat · Terakhir: ${lastDateLabel}</div>
    ${rows}
    <button class="start-btn" id="newSessionBtn" style="margin-top:24px;">Latihan Lagi</button>
    <button class="retry-btn" id="resetHistBtn" style="margin-top:10px; border-color: var(--bad); color: var(--bad);">Hapus Riwayat Modul Ini</button>
    <button class="link-btn" id="backModuleBtn2">← Ganti Modul</button>
  `;
  document.getElementById('newSessionBtn').onclick = renderSetup;
  document.getElementById('backModuleBtn2').onclick = renderModuleSelect;
  document.getElementById('resetHistBtn').onclick = ()=>{
    if(confirm('Hapus seluruh riwayat monitoring latihan untuk modul ini? Tindakan ini tidak dapat dibatalkan.')){
      clearHistory();
      renderHistory();
    }
  };
}

renderModuleSelect();
</script>
</body>
</html>
