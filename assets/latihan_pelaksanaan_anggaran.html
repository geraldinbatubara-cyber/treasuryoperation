<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Asesmen — Pelaksanaan Anggaran</title>
<style>
  :root{
    --ink:#122C31;
    --paper:#F1EEE3;
    --paper-dim:#E7E3D5;
    --brass:#AD8A4E;
    --brass-deep:#8B6D38;
    --good:#3E6B52;
    --bad:#A2403F;
    --line: rgba(18,44,49,0.16);
    --shadow: 0 18px 40px -18px rgba(18,44,49,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(173,138,78,0.18), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(173,138,78,0.10), transparent 45%);
    min-height:100vh;
    font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 40px 16px;
  }
  .stage{
    width:100%;
    max-width:640px;
  }
  .masthead{
    text-align:center;
    margin-bottom:22px;
    color: var(--paper);
  }
  .masthead .eyebrow{
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color: rgba(241,238,227,0.62);
    margin-bottom:8px;
  }
  .masthead h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:700;
    font-size: clamp(24px, 5vw, 32px);
    margin:0 0 6px 0;
    letter-spacing:0.01em;
  }
  .masthead p{
    margin:0;
    font-size:13.5px;
    color: rgba(241,238,227,0.55);
  }

  .sheet{
    position:relative;
    background: var(--paper);
    border-radius: 3px;
    box-shadow: var(--shadow);
    padding: 34px 32px 28px 32px;
    border: 1px solid rgba(18,44,49,0.08);
  }
  .sheet::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:6px;
    background: repeating-linear-gradient(90deg, var(--brass) 0 14px, transparent 14px 24px);
    opacity:0.55;
  }

  /* ---- Perforated tear edge at bottom ---- */
  .tear{
    height:14px;
    background:
      radial-gradient(circle at 10px 0, transparent 7px, var(--ink) 7px) top left/20px 14px repeat-x;
    margin-top:-1px;
  }

  /* ---- Setup screen ---- */
  .field-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color: rgba(18,44,49,0.55);
    margin: 18px 0 8px 0;
    font-weight:600;
  }
  .field-label:first-of-type{ margin-top:2px; }
  .choice-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    border:1.5px solid var(--line);
    background: rgba(255,255,255,0.35);
    padding:9px 14px;
    border-radius:20px;
    font-size:13.5px;
    cursor:pointer;
    transition: all .15s ease;
    color: var(--ink);
  }
  .chip:hover{ border-color: var(--brass); }
  .chip.active{
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .start-btn{
    margin-top:26px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:3px;
    background: var(--brass-deep);
    color: var(--paper);
    font-size:15px;
    font-weight:600;
    letter-spacing:0.03em;
    cursor:pointer;
    transition: transform .12s ease, background .15s ease;
  }
  .start-btn:hover{ background:#7A5D2F; transform: translateY(-1px); }
  .start-btn:active{ transform: translateY(0); }

  /* ---- Quiz header ---- */
  .quiz-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 6px;
  }
  .bab-tag{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--brass-deep);
    font-weight:700;
  }
  .counter{
    font-family: Georgia, serif;
    font-size:13px;
    color: rgba(18,44,49,0.55);
  }
  .progress-track{
    height:4px;
    background: var(--paper-dim);
    border-radius:2px;
    overflow:hidden;
    margin: 10px 0 26px 0;
  }
  .progress-fill{
    height:100%;
    background: var(--brass);
    transition: width .3s ease;
  }

  .question-text{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px;
    line-height:1.5;
    margin: 0 0 22px 0;
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:12px;
    width:100%;
    text-align:left;
    padding:14px 16px;
    margin-bottom:10px;
    border:1.5px solid var(--line);
    background: rgba(255,255,255,0.3);
    border-radius:3px;
    font-size:14.5px;
    line-height:1.45;
    cursor:pointer;
    color: var(--ink);
    transition: border-color .12s ease, background .12s ease;
  }
  .option:hover:not(.locked){ border-color: var(--brass); background: rgba(255,255,255,0.55); }
  .option .letter{
    flex:0 0 auto;
    width:24px; height:24px;
    border-radius:50%;
    border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700;
    font-family: Georgia, serif;
  }
  .option.correct{
    border-color: var(--good);
    background: rgba(62,107,82,0.12);
  }
  .option.correct .letter{ background: var(--good); border-color: var(--good); color:#fff; }
  .option.wrong{
    border-color: var(--bad);
    background: rgba(162,64,63,0.10);
  }
  .option.wrong .letter{ background: var(--bad); border-color: var(--bad); color:#fff; }
  .option.dim{ opacity:0.55; }

  .stamp{
    display:inline-block;
    margin: 4px 0 16px 0;
    padding: 5px 16px;
    border: 2.5px solid;
    border-radius: 4px;
    transform: rotate(-3deg);
    font-family: Georgia, serif;
    font-weight:700;
    letter-spacing:0.12em;
    font-size:13px;
    text-transform:uppercase;
  }
  .stamp.good{ color: var(--good); border-color: var(--good); }
  .stamp.bad{ color: var(--bad); border-color: var(--bad); }

  .explain{
    font-size:13.5px;
    line-height:1.55;
    color: rgba(18,44,49,0.78);
    background: var(--paper-dim);
    border-left: 3px solid var(--brass);
    padding: 12px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
    display:none;
  }
  .explain.show{ display:block; }

  .next-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:3px;
    background: var(--ink);
    color: var(--paper);
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ background:#0A1E22; }

  /* ---- Results ---- */
  .result-score{
    text-align:center;
    font-family: Georgia, serif;
    font-size: 52px;
    font-weight:700;
    margin: 6px 0 2px 0;
  }
  .result-sub{
    text-align:center;
    font-size:13.5px;
    color: rgba(18,44,49,0.6);
    margin-bottom:26px;
  }
  .bab-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom: 1px solid var(--line);
    font-size:13.5px;
  }
  .bab-row:last-child{ border-bottom:none; }
  .bab-bar-track{
    flex:1;
    height:6px;
    background: var(--paper-dim);
    border-radius:3px;
    margin: 0 12px;
    overflow:hidden;
  }
  .bab-bar-fill{
    height:100%;
    background: var(--brass);
  }
  .bab-score{
    font-family: Georgia, serif;
    font-weight:700;
    width:44px;
    text-align:right;
  }
  .retry-btn{
    width:100%;
    margin-top:24px;
    padding:14px;
    border:1.5px solid var(--ink);
    background:transparent;
    border-radius:3px;
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    color: var(--ink);
  }
  .retry-btn:hover{ background: rgba(18,44,49,0.06); }

  .history-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    background:transparent;
    font-size:13px;
    font-weight:600;
    color: var(--brass-deep);
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset:3px;
  }
  .history-btn:hover{ color: #7A5D2F; }

  .link-btn{
    width:100%;
    margin-top:14px;
    padding:10px;
    border:none;
    background:transparent;
    font-size:12.5px;
    color: rgba(18,44,49,0.5);
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset:3px;
  }

  .empty-state{
    text-align:center;
    font-size:13.5px;
    color: rgba(18,44,49,0.6);
    padding: 30px 10px;
    line-height:1.6;
  }

  .hist-row{
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .hist-row:last-child{ border-bottom:none; }
  .hist-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
    gap:10px;
  }
  .hist-bab{
    font-size:13.5px;
    font-weight:600;
  }
  .hist-pct{
    font-family: Georgia, serif;
    font-weight:700;
    font-size:13px;
    color: var(--brass-deep);
    white-space:nowrap;
  }
  .hist-pct.dim-pct{
    color: rgba(18,44,49,0.35);
    font-family: inherit;
    font-weight:400;
    font-style:italic;
  }
  .hist-meta{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-top:8px;
    font-size:11.5px;
    color: rgba(18,44,49,0.5);
    gap:12px;
  }
  .spark{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:32px;
  }
  .spark-bar{
    width:5px;
    background: var(--brass);
    border-radius:1px;
    opacity:0.85;
  }

  @media (max-width:480px){
    .sheet{ padding:26px 20px 22px 20px; }
    .question-text{ font-size:17px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div class="eyebrow">Simulasi Asesmen Kemampuan Pegawai</div>
    <h1>Latihan Soal · Pelaksanaan Anggaran</h1>
    <p>Berdasarkan Modul Pelaksanaan Anggaran — Direktorat Jenderal Perbendaharaan</p>
  </div>

  <div class="sheet" id="sheet"></div>
  <div class="tear"></div>
</div>

<script>
const BANK = [
{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Dalam struktur tata kelola keuangan negara, Menteri/Pimpinan Lembaga berperan sebagai Pengguna Anggaran (PA) yang merepresentasikan fungsi:",
  opts:["Chief Financial Officer (CFO)","Chief Operating Officer (COO)","Kuasa Bendahara Umum Negara","Kepala Satuan Kerja"], ans:1,
  exp:"Menteri Keuangan berperan sebagai CFO (pengelola fiskal), sedangkan Menteri/Pimpinan Lembaga berperan sebagai COO yang menjadi Pengguna Anggaran (PA)."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Berdasarkan ketentuan larangan perangkapan jabatan pejabat perbendaharaan yang berlaku saat ini, pernyataan yang benar adalah:",
  opts:["PPK dapat dirangkap oleh PPSPM","Bendahara dapat dirangkap oleh KPA","KPA dapat merangkap sebagai PPK atau PPSPM, namun tidak boleh keduanya","PPSPM dapat dirangkap oleh Bendahara"], ans:2,
  exp:"Sesuai PP 45/2013 jo. PP 50/2018: Bendahara tidak boleh dirangkap KPA/PPK/PPSPM; PPK tidak boleh dirangkap PPSPM; sedangkan PPK atau PPSPM dapat dirangkap KPA, tapi tidak boleh keduanya sekaligus."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Jabatan Kuasa Pengguna Anggaran (KPA) bersifat ex-officio, artinya:",
  opts:["Ditetapkan melalui pemilihan oleh pegawai satker","Posisi ini melekat pada jabatan Kepala Satker","Diangkat langsung oleh Menteri Keuangan","Berlaku hanya untuk satu tahun anggaran"], ans:1,
  exp:"KPA ditunjuk sebagai representasi PA di tingkat operasional dan jabatannya bersifat ex-officio, melekat pada jabatan Kepala Satuan Kerja (Satker)."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Yang bertugas menerbitkan Surat Perintah Membayar (SPM) setelah melakukan uji formal atas SPP adalah:",
  opts:["Pejabat Pembuat Komitmen (PPK)","Bendahara Pengeluaran","Pejabat Penanda tangan SPM (PPSPM)","Kuasa Pengguna Anggaran (KPA)"], ans:2,
  exp:"PPSPM berperan sebagai validator/penguji tagihan; setelah SPP dinyatakan sesuai, PPSPM menerbitkan SPM untuk diteruskan ke KPPN."},

{bab:"Bab 1 — Pejabat Perbendaharaan", q:"Sertifikat kompetensi teknis bagi Bendahara dalam kerangka pejabat perbendaharaan disebut:",
  opts:["PNT (PPK Negara Tersertifikasi)","SNT (PPSPM Negara Tersertifikasi)","BNT (Bendahara Negara Tersertifikasi)","ANT (Analis Negara Tersertifikasi)"], ans:2,
  exp:"Standar Kompetensi Teknis dibuktikan dengan sertifikat: PNT untuk PPK, SNT untuk PPSPM, dan BNT untuk Bendahara."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Dokumen yang menjadi dasar bagi Kuasa BUN untuk melakukan pencairan dana APBN adalah:",
  opts:["Rencana Kerja dan Anggaran (RKA)","Daftar Isian Pelaksanaan Anggaran (DIPA)","Surat Perintah Membayar (SPM)","Petunjuk Operasional Kegiatan (POK)"], ans:1,
  exp:"DIPA digunakan oleh PA/KPA sebagai dasar pelaksanaan pembayaran dan digunakan oleh Kuasa BUN sebagai dasar pencairan dana."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Revisi DIPA yang bersifat memerlukan penelaahan, khususnya terkait efisiensi biaya per unit output, menjadi kewenangan:",
  opts:["Direktorat Pelaksanaan Anggaran","Kantor Wilayah DJPb","Direktorat Jenderal Anggaran (DJA)","Kuasa Pengguna Anggaran (KPA)"], ans:2,
  exp:"Revisi yang memerlukan penelaahan menjadi kewenangan DJA, sedangkan revisi di lingkup DJPb (Direktorat Pelaksanaan Anggaran/Kanwil) hanya bersifat pengesahan tanpa penelaahan."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Batas waktu maksimal bagi penyedia untuk mengajukan tagihan pembayaran sejak hak tagih kepada negara muncul adalah:",
  opts:["3 hari kerja","5 hari kerja","7 hari kerja","10 hari kerja"], ans:1,
  exp:"Penyedia wajib mengajukan tagihan paling lambat 5 hari kerja sejak hak tagih muncul; jika tidak, PPK wajib memberi pemberitahuan tertulis."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Mekanisme pembayaran yang menjadi prinsip utama untuk penerima hak pembayaran (penyedia, pegawai, dll.) adalah:",
  opts:["Uang Persediaan (UP)","Tambahan Uang Persediaan (TUP)","Pembayaran Langsung (LS)","Rekening Penampungan Akhir Tahun"], ans:2,
  exp:"Prinsip utama pembayaran tagihan dilakukan melalui mekanisme Pembayaran Langsung (LS) kepada penerima hak pembayaran."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Uang muka kerja yang diberikan Kuasa BUN kepada Bendahara Pengeluaran untuk membiayai kegiatan operasional sehari-hari yang tidak dapat dilakukan melalui mekanisme LS disebut:",
  opts:["Tambahan Uang Persediaan (TUP)","Uang Persediaan (UP)","Rekening Penampungan Akhir Tahun (RPATA)","Dana Titipan"], ans:1,
  exp:"UP adalah uang muka kerja untuk membiayai kegiatan operasional sehari-hari dan pengeluaran yang tidak dapat dilakukan melalui LS; TUP adalah penambahan UP untuk kondisi mendesak tertentu."},

{bab:"Bab 2 — Mekanisme Pembayaran APBN", q:"Setelah SPM disetujui oleh Kepala Seksi PD/PDMS melalui sistem SPAN, tahap berikutnya dalam pencairan dana adalah:",
  opts:["PPK menerbitkan SPP baru","Diproses melalui Payment Process Request (PPR) untuk penerbitan SP2D","Dikembalikan ke satker untuk revisi","PPSPM melakukan uji formal ulang"], ans:1,
  exp:"SPM yang telah disetujui diproses oleh Direktorat Pengelolaan Kas Negara melalui PPR untuk penerbitan Surat Perintah Pencairan Dana (SP2D)."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Konsep 'Prefinancing' dalam penetapan MP PNBP yang berlaku sejak Oktober 2021 memungkinkan:",
  opts:["Satker hanya boleh belanja setelah ada realisasi setoran PNBP","Satker dapat belanja sumber dana PNBP sebelum ada realisasi penerimaan PNBP","Satker wajib menyetorkan seluruh PNBP di akhir tahun","MP PNBP hanya dapat diajukan sekali dalam setahun"], ans:1,
  exp:"Melalui PMK 110/PMK.05/2021, konsep Prefinancing memungkinkan K/L melakukan belanja sumber dana PNBP sebelum memiliki realisasi penerimaan PNBP, untuk mempercepat kualitas belanja."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"MP PNBP Reguler Tahap I dapat diajukan paling cepat pada bulan dan dengan besaran maksimal:",
  opts:["Januari, 60%","Juli, 80%","Oktober, 100%","Maret, 50%"], ans:0,
  exp:"MP PNBP Tahap I paling besar 60% dari pagu DIPA sumber dana PNBP dan diajukan paling cepat bulan Januari."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Pola penetapan MP PNBP yang memungkinkan Kementerian/Lembaga mengajukan penetapan untuk seluruh satker sekaligus dan dapat mengubah alokasi antar satker disebut:",
  opts:["Pola tidak terpusat","Pola terpusat","Pola progresif","Pola percepatan"], ans:1,
  exp:"Pola terpusat diusulkan oleh Sekjen/Seskemen/Pimpinan Unit Eselon I dan disetujui Dirjen Perbendaharaan, memungkinkan pengajuan untuk seluruh satker sekaligus serta Perubahan Lampiran Alokasi MP PNBP antar satker."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"Secara default, satker PNBP mengajukan permohonan penetapan MP PNBP melalui pola tidak terpusat kepada:",
  opts:["Direktur Jenderal Anggaran","Kepala Kantor Wilayah DJPb mitra kerjanya","Direktur Jenderal Perbendaharaan langsung","Menteri Keuangan"], ans:1,
  exp:"Pada pola tidak terpusat (default), satker PNBP mengajukan permohonan penetapan MP PNBP kepada Kepala Kantor Wilayah DJPb mitra kerjanya."},

{bab:"Bab 3 — Maksimum Pencairan PNBP", q:"MP PNBP Percepatan Tahap II dapat diajukan sebelum bulan Juli dengan syarat realisasi setoran PNBP telah mencapai paling kurang:",
  opts:["40%","50%","60%","70%"], ans:2,
  exp:"MP PNBP Percepatan Tahap II (maksimal 80%) dapat diajukan sebelum Juli dengan syarat realisasi setoran PNBP telah mencapai minimal 60%."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Hibah yang mekanismenya menggabungkan proses perencanaan (dialokasikan dalam RKA-K/L dan DIPA) namun pelaksanaannya menerapkan mekanisme hibah langsung disebut:",
  opts:["Hibah terencana","Hibah langsung murni","Hibah hybrid","Hibah spontan"], ans:2,
  exp:"Hibah hybrid melalui mekanisme perencanaan (dialokasikan dalam RKA-K/L dan DIPA) namun pelaksanaannya menerapkan mekanisme hibah langsung. Contohnya Hibah Millennium Challenge Corporation (MCC)."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Berdasarkan penarikannya, hibah diklasifikasikan menjadi:",
  opts:["Hibah uang dan hibah barang/jasa","Hibah dalam negeri dan hibah luar negeri","Hibah melalui BUN dan hibah tidak melalui BUN","Hibah terencana dan hibah hybrid"], ans:2,
  exp:"Menurut penarikannya, hibah diklasifikasikan menjadi hibah melalui Bendahara Umum Negara (BUN) dan hibah tidak melalui BUN."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Satker penerima hibah langsung uang wajib menggunakan rekening khusus yang disebut:",
  opts:["Rekening Kas Umum Negara (RKUN)","Rekening Pemerintah Lainnya (RPL) Hibah","Rekening Penampungan Akhir Tahun Anggaran (RPATA)","Rekening Kas Umum Daerah (RKUD)"], ans:1,
  exp:"Satker penerima hibah langsung uang wajib menggunakan Rekening Pemerintah Lainnya (RPL) Hibah, yang dapat berupa RPL penampungan dan/atau RPL penyaluran hibah."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Menurut PP Nomor 10 Tahun 2011, salah satu kriteria agar suatu penerimaan negara dapat dikategorikan sebagai hibah adalah:",
  opts:["Harus dibayarkan kembali dalam jangka waktu tertentu","Boleh disertai ikatan politik tertentu","Tidak dimaksudkan untuk dibayarkan kembali kepada pemberi hibah","Wajib bersumber dari luar negeri"], ans:2,
  exp:"Kriteria hibah antara lain: tidak dimaksudkan untuk dibayarkan kembali, tidak disertai ikatan politik/tidak mengganggu stabilitas keamanan negara, dan digunakan mendukung sasaran keluaran kegiatan satker atau penanggulangan keadaan darurat."},

{bab:"Bab 4 — Pengelolaan Hibah", q:"Hibah yang bersumber dari dalam negeri diregistrasi di:",
  opts:["DJPPR","Direktorat Jenderal Anggaran","Kantor Wilayah DJPb setempat","Kementerian Dalam Negeri"], ans:2,
  exp:"Berdasarkan PMK 99/PMK.05/2017, hibah yang bersumber dari dalam negeri diregistrasi di Kantor Wilayah DJPb setempat, sedangkan hibah luar negeri diregistrasi di DJPPR."},

{bab:"Bab 5 — Transfer ke Daerah", q:"DAU yang diberikan kepada daerah tanpa ditentukan penggunaannya secara spesifik oleh pemerintah pusat disebut:",

  exp:"Dana Tambahan Infrastruktur (DTI) dialokasikan bagi provinsi-provinsi di wilayah Papua untuk membiayai pembangunan infrastruktur perhubungan, energi listrik, air bersih, telekomunikasi, dan sanitasi."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Indikator Penyerapan Anggaran dalam IKPA memiliki bobot sebesar:",
  opts:["10%","15%","20%","25%"], ans:2,
  exp:"Indikator Penyerapan Anggaran memiliki bobot 20% dan digunakan mengukur kesesuaian eksekusi belanja dengan target penyerapan anggaran pada setiap triwulan."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Target penyerapan anggaran triwulan I untuk jenis Belanja Modal adalah:",
  opts:["10%","15%","20%","25%"], ans:0,
  exp:"Target penyerapan anggaran triwulanan Belanja Modal adalah 10% (Tw I), 40% (Tw II), 70% (Tw III), dan 90% (Tw IV), berbeda dengan Belanja Pegawai/Barang/Bansos."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Satker yang tidak termasuk dalam objek penilaian kinerja indikator Penyerapan Anggaran IKPA adalah:",
  opts:["Satker Kantor Pusat","Satker BLU","Satker Kantor Daerah","Satker Dekonsentrasi"], ans:1,
  exp:"Satker Badan Layanan Umum (BLU) tidak termasuk dalam objek penilaian kinerja indikator Penyerapan Anggaran karena karakteristik fleksibilitas keuangannya berbeda dari satker pada umumnya."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Indikator Belanja Kontraktual dalam IKPA memiliki bobot dan terdiri dari tiga komponen, yaitu:",
  opts:["Bobot 20%: akselerasi kontrak dini, akselerasi belanja modal, distribusi akselerasi kontrak","Bobot 10%: akselerasi kontrak dini, akselerasi belanja modal, distribusi akselerasi kontrak","Bobot 15%: revisi DIPA, deviasi halaman III, capaian output","Bobot 25%: ketepatan waktu, capaian RO, dispensasi SPM"], ans:1,
  exp:"Indikator Belanja Kontraktual berbobot 10%, terdiri dari komponen Akselerasi Kontrak Dini (40%), Akselerasi Belanja Modal (40%), dan Distribusi Akselerasi Kontrak (20%)."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Indikator Dispensasi SPM dalam IKPA berfungsi sebagai:",
  opts:["Penambah nilai kinerja secara bertingkat","Pengurang nilai kinerja secara bertingkat","Indikator tunggal tanpa bobot","Syarat penetapan MP PNBP"], ans:1,
  exp:"Indikator Dispensasi SPM mengukur kepatuhan penyampaian SPM sesuai batas waktu di akhir tahun anggaran, dan berfungsi sebagai pengurang nilai IKPA secara bertingkat sesuai kategori rasio dispensasi."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Indikator Capaian Output dalam IKPA memiliki bobot 25% yang terdiri dari dua komponen, yaitu:",
  opts:["Ketepatan Waktu Penyampaian Data (30%) dan Capaian Rincian Output (70%)","Akselerasi Kontrak (50%) dan Distribusi Kontrak (50%)","Revisi DIPA (50%) dan Deviasi Halaman III (50%)","Penyerapan Triwulanan (100%)"], ans:0,
  exp:"Capaian Output terdiri dari komponen Ketepatan Waktu Penyampaian Data (bobot 30%) dan Capaian Rincian Output/RO (bobot 70%)."},

{bab:"Bab 6 — Monitoring dan Evaluasi", q:"Dalam penilaian Capaian Rincian Output (RO), nilai kinerja hanya dihitung untuk RO dengan status:",
  opts:["Terkonfirmasi dan Valid","Tidak Terkonfirmasi namun Valid","Terkonfirmasi namun Tidak Valid","Tidak Terkonfirmasi dan Tidak Valid"], ans:0,
  exp:"RO yang dihitung nilai kinerjanya adalah RO dengan status 'Terkonfirmasi' dan 'Valid'; ketiga kombinasi status lainnya menghasilkan nilai 0."}
];

let session = [];
let idx = 0;
let score = 0;
let answered = false;
let babStats = {};

const HISTORY_KEY = 'latihan_pa_history_v1';

function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

function saveAttempt(babStatsResult){
  try{
    const history = loadHistory();
    history.push({
      date: new Date().toISOString(),
      babStats: babStatsResult
    });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }catch(e){ /* storage unavailable, skip silently */ }
}

function clearHistory(){
  try{ localStorage.removeItem(HISTORY_KEY); }catch(e){}
}

function aggregateHistory(){
  const history = loadHistory();
  const agg = {};
  history.forEach(attempt=>{
    Object.keys(attempt.babStats).forEach(bab=>{
      if(!agg[bab]) agg[bab] = {correct:0, total:0, attempts:0, trend:[]};
      const s = attempt.babStats[bab];
      agg[bab].correct += s.correct;
      agg[bab].total += s.total;
      agg[bab].attempts += 1;
      agg[bab].trend.push(Math.round((s.correct/s.total)*100));
    });
  });
  return {agg, sessionCount: history.length, lastDate: history.length ? history[history.length-1].date : null};
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderSetup(){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="field-label">Jumlah soal</div>
    <div class="choice-row" id="countRow">
      <div class="chip" data-v="10">10 soal</div>
      <div class="chip active" data-v="20">20 soal</div>
      <div class="chip" data-v="${BANK.length}">Semua (${BANK.length} soal)</div>
    </div>
    <div class="field-label">Cakupan bab</div>
    <div class="choice-row" id="scopeRow">
      <div class="chip active" data-v="all">Acak semua bab</div>
      <div class="chip" data-v="1">Bab 1</div>
      <div class="chip" data-v="2">Bab 2</div>
      <div class="chip" data-v="3">Bab 3</div>
      <div class="chip" data-v="4">Bab 4</div>
      <div class="chip" data-v="5">Bab 5</div>
      <div class="chip" data-v="6">Bab 6</div>
    </div>
    <button class="start-btn" id="startBtn">Mulai Latihan</button>
    <button class="link-btn" id="viewHistoryBtn">Lihat Monitoring Riwayat Latihan</button>
  `;
  let count = 20, scope = 'all';
  document.querySelectorAll('#countRow .chip').forEach(c=>{
    c.onclick = ()=>{
      document.querySelectorAll('#countRow .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      count = parseInt(c.dataset.v);
    };
  });
  document.querySelectorAll('#scopeRow .chip').forEach(c=>{
    c.onclick = ()=>{
      document.querySelectorAll('#scopeRow .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      scope = c.dataset.v;
    };
  });
  document.getElementById('viewHistoryBtn').onclick = renderHistory;
  document.getElementById('startBtn').onclick = ()=>{
    let pool = BANK;
    if(scope !== 'all'){
      pool = BANK.filter(q => q.bab.startsWith('Bab ' + scope + ' '));
    }
    const shuffled = shuffle(pool);
    session = shuffled.slice(0, Math.min(count, shuffled.length)).map(q=>{
      const optOrder = shuffle(q.opts.map((o,i)=>({text:o, orig:i})));
      return {...q, optOrder, correctPos: optOrder.findIndex(o=>o.orig===q.ans)};
    });
    idx = 0; score = 0; answered = false; babStats = {};
    renderQuestion();
  };
}

function renderQuestion(){
  const sheet = document.getElementById('sheet');
  const q = session[idx];
  answered = false;
  const pct = Math.round((idx/session.length)*100);
  sheet.innerHTML = `
    <div class="quiz-top">
      <div class="bab-tag">${q.bab}</div>
      <div class="counter">Soal ${idx+1} / ${session.length}</div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-text">${q.q}</div>
    <div id="optionsWrap"></div>
    <div class="explain" id="explainBox"></div>
    <button class="next-btn" id="nextBtn">${idx===session.length-1 ? 'Lihat Hasil Akhir' : 'Soal Berikutnya'}</button>
  `;
  const wrap = document.getElementById('optionsWrap');
  const letters = ['A','B','C','D'];
  q.optOrder.forEach((opt, i)=>{
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt.text}</span>`;
    div.onclick = ()=> selectOption(i);
    wrap.appendChild(div);
  });
  document.getElementById('nextBtn').onclick = ()=>{
    idx++;
    if(idx >= session.length){ renderResults(); } else { renderQuestion(); }
  };
}

function selectOption(i){
  if(answered) return;
  answered = true;
  const q = session[idx];
  if(!babStats[q.bab]) babStats[q.bab] = {correct:0, total:0};
  babStats[q.bab].total++;

  const opts = document.querySelectorAll('.option');
  const isCorrect = i === q.correctPos;
  if(isCorrect){ score++; babStats[q.bab].correct++; }

  opts.forEach((el, j)=>{
    if(j === q.correctPos) el.classList.add('correct');
    else if(j === i) el.classList.add('wrong');
    else el.classList.add('dim');
  });

  const box = document.getElementById('explainBox');
  box.innerHTML = `<span class="stamp ${isCorrect?'good':'bad'}">${isCorrect?'Benar':'Kurang Tepat'}</span><div>${q.exp}</div>`;
  box.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function renderResults(){
  saveAttempt(babStats);
  const sheet = document.getElementById('sheet');
  const pctScore = Math.round((score/session.length)*100);
  let babRows = '';
  Object.keys(babStats).forEach(bab=>{
    const s = babStats[bab];
    const p = Math.round((s.correct/s.total)*100);
    babRows += `
      <div class="bab-row">
        <span>${bab.replace(/^Bab \d+ — /,'')}</span>
        <div class="bab-bar-track"><div class="bab-bar-fill" style="width:${p}%"></div></div>
        <span class="bab-score">${s.correct}/${s.total}</span>
      </div>`;
  });
  sheet.innerHTML = `
    <div class="field-label" style="text-align:center;margin-top:0;">Hasil Latihan</div>
    <div class="result-score">${score}<span style="font-size:24px;color:rgba(18,44,49,0.4);"> / ${session.length}</span></div>
    <div class="result-sub">${pctScore}% jawaban benar</div>
    ${babRows}
    <button class="retry-btn" id="retryBtn">Latihan Lagi</button>
    <button class="history-btn" id="historyBtn">Lihat Monitoring Riwayat</button>
  `;
  document.getElementById('retryBtn').onclick = renderSetup;
  document.getElementById('historyBtn').onclick = renderHistory;
}

function renderHistory(){
  const sheet = document.getElementById('sheet');
  const {agg, sessionCount, lastDate} = aggregateHistory();
  const babOrder = ["Bab 1 — Pejabat Perbendaharaan","Bab 2 — Mekanisme Pembayaran APBN","Bab 3 — Maksimum Pencairan PNBP","Bab 4 — Pengelolaan Hibah","Bab 5 — Transfer ke Daerah","Bab 6 — Monitoring dan Evaluasi"];

  if(sessionCount === 0){
    sheet.innerHTML = `
      <div class="field-label" style="text-align:center;margin-top:0;">Monitoring Riwayat Latihan</div>
      <div class="empty-state">Belum ada riwayat latihan tersimpan. Riwayat akan tercatat otomatis setiap kali kamu menyelesaikan satu sesi latihan.</div>
      <button class="retry-btn" id="backBtn">Mulai Latihan</button>
    `;
    document.getElementById('backBtn').onclick = renderSetup;
    return;
  }

  let rows = '';
  babOrder.forEach(bab=>{
    const s = agg[bab];
    const label = bab.replace(/^Bab \d+ — /,'');
    const babNum = bab.match(/Bab (\d+)/)[1];
    if(!s){
      rows += `
        <div class="hist-row">
          <div class="hist-top"><span class="hist-bab">Bab ${babNum} · ${label}</span><span class="hist-pct dim-pct">belum dicoba</span></div>
          <div class="bab-bar-track"><div class="bab-bar-fill" style="width:0%"></div></div>
        </div>`;
      return;
    }
    const pctAvg = Math.round((s.correct/s.total)*100);
    const lastN = s.trend.slice(-8);
    const sparkline = lastN.map((v,i)=>`<div class="spark-bar" style="height:${Math.max(6,v*0.32)}px" title="${v}%"></div>`).join('');
    rows += `
      <div class="hist-row">
        <div class="hist-top">
          <span class="hist-bab">Bab ${babNum} · ${label}</span>
          <span class="hist-pct">${pctAvg}% rata-rata</span>
        </div>
        <div class="bab-bar-track"><div class="bab-bar-fill" style="width:${pctAvg}%"></div></div>
        <div class="hist-meta">
          <span>${s.attempts}x dikerjakan · ${s.correct}/${s.total} jawaban benar kumulatif</span>
          <div class="spark">${sparkline}</div>
        </div>
      </div>`;
  });

  const lastDateLabel = lastDate ? new Date(lastDate).toLocaleString('id-ID', {dateStyle:'medium', timeStyle:'short'}) : '-';

  sheet.innerHTML = `
    <div class="field-label" style="text-align:center;margin-top:0;">Monitoring Riwayat Latihan</div>
    <div class="result-sub" style="margin-bottom:22px;">${sessionCount} sesi tercatat · Terakhir: ${lastDateLabel}</div>
    ${rows}
    <button class="start-btn" id="newSessionBtn" style="margin-top:24px;">Latihan Lagi</button>
    <button class="retry-btn" id="resetHistBtn" style="margin-top:10px; border-color: var(--bad); color: var(--bad);">Hapus Riwayat</button>
  `;
  document.getElementById('newSessionBtn').onclick = renderSetup;
  document.getElementById('resetHistBtn').onclick = ()=>{
    if(confirm('Hapus seluruh riwayat monitoring latihan? Tindakan ini tidak dapat dibatalkan.')){
      clearHistory();
      renderHistory();
    }
  };
}

renderSetup();
</script>
</body>
</html>
